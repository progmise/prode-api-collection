info:
  name: Get partidos
  type: http
  seq: 2

http:
  method: GET
  url: "{{protocol}}://{{host}}{{path_api}}/partidos?_offset=0&_limit=10&fecha={{fecha}}&equipo={{equipo}}&fase={{fase}}"
  params:
    - name: _offset
      value: "0"
      type: query
    - name: _limit
      value: "10"
      type: query
    - name: fecha
      value: "{{fecha}}"
      type: query
    - name: equipo
      value: "{{equipo}}"
      type: query
    - name: fase
      value: "{{fase}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
