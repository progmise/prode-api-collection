info:
  name: Post partido
  type: http
  seq: 3

http:
  method: POST
  url: "{{protocol}}://{{host}}{{path_api}}/partidos"
  body:
    type: json
    data: |-
      {
        "equipo_local": "Brasil",
        "equipo_visitante": "Argentina",
        "fase": "{{fase}}",
        "fecha": "{{fecha}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
