info:
  name: Put usuario by id
  type: http
  seq: 4

http:
  method: PUT
  url: "{{protocol}}://{{host}}{{path_api}}/usuarios/{{usuario_id}}"
  body:
    type: json
    data: |-
      {
        "nombre": "Juan González",
        "email": "juan@example.com"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
